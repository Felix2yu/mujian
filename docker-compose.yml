services:
  mujian:
    image: ghcr.io/felix2yu/mujian:latest
    ports:
      - "8080:8080"
    volumes:
      - mujian-data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - PUID=1000
      - PGID=1000
      - ALLOW_LOCAL_STORAGE=true
    restart: unless-stopped

volumes:
  mujian-data:
