  <path d="M0,0 L0,100 L7,100 C7,84 6,68 6,52 C6,36 7,20 7,6 L7,0 Z" fill="#5C1010"/>
  <path d="M4,0 L4,100" fill="none" stroke="#3D0A0A" stroke-width="1" opacity="0.5"/>
  <path d="M18,0 L18,100" fill="none" stroke="#D4736A" stroke-width="0.8" opacity="0.2"/>
  <path d="M26,0 L26,100" fill="none" stroke="#3D0A0A" stroke-width="0.8" opacity="0.3"/>
  <!-- Right curtain -->
