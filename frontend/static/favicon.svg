<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="stage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#A0734C"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="#0A0101"/>
  <!-- Stage floor -->
  <rect x="0" y="85" width="100" height="15" fill="url(#stage)"/>
  <!-- Light beams from top -->
  <polygon points="40,0 60,0 66,68 34,68" fill="url(#beam)" opacity="0.35"/>
  <polygon points="45,0 55,0 60,68 40,68" fill="url(#beam)" opacity="0.25"/>
