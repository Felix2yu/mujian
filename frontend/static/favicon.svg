  <path d="M100,0 L100,100 L78,100 C78,84 79,68 79,52 C79,36 78,20 78,6 L78,0 Z" fill="#991B1B"/>
  <path d="M100,0 L100,100 L86,100 C86,84 87,68 87,52 C87,36 86,20 86,6 L86,0 Z" fill="#7F1D1D"/>
  <path d="M100,0 L100,100 L93,100 C93,84 94,68 94,52 C94,36 93,20 93,6 L93,0 Z" fill="#5C1010"/>
  <path d="M96,0 L96,100" fill="none" stroke="#3D0A0A" stroke-width="1" opacity="0.5"/>
  <path d="M82,0 L82,100" fill="none" stroke="#D4736A" stroke-width="0.8" opacity="0.2"/>
  <path d="M74,0 L74,100" fill="none" stroke="#3D0A0A" stroke-width="0.8" opacity="0.3"/>
