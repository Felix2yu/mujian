<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes" />
	<meta name="theme-color" content="#4A90D9" />
	<meta name="description" content="记录和管理你的现场演出体验" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
	<meta name="apple-mobile-web-app-title" content="幕间" />
	<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
	<link rel="apple-touch-icon" href="/icons/icon-192.svg" />
	<link rel="manifest" href="/manifest.json" />
	<title>幕间 - 现场演出记录</title>
	<script>
		(function() {
			var theme = localStorage.getItem('theme') || 'auto';
			var dark = theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
			if (dark) document.documentElement.classList.add('dark');
			else document.documentElement.classList.add('light');
		})();
	</script>
	%sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
	<script>
		if ('serviceWorker' in navigator) {
			window.addEventListener('load', () => {
				navigator.serviceWorker.register('/sw.js').then(reg => {
					reg.addEventListener('updatefound', () => {
						const newWorker = reg.installing;
						if (newWorker) {
							newWorker.addEventListener('statechange', () => {
								if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
									if (confirm('有新版本可用，是否更新？')) {
										newWorker.postMessage({ type: 'SKIP_WAITING' });
										window.location.reload();
									}
								}
							});
						}
					});
				}).catch(err => console.log('SW registration failed:', err));
			});
		}
	</script>
</body>
</html>
